apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cometmind.fullname" . }}
  labels:
    {{- include "cometmind.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "cometmind.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cometmind.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cometmind.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/cometmind", "init", "-w", "/workspace"]
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "cometmind.fullname" . }}-secrets
          volumeMounts:
            - name: data
              mountPath: /data
            - name: workspace
              mountPath: /workspace
            {{- if and .Values.settings.create .Values.settings.json }}
            - name: settings
              mountPath: /data/cometline-settings.json
              subPath: cometline-settings.json
            {{- end }}
      containers:
        - name: serve
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/cometmind", "serve", "--port", "7700", "--bind", "0.0.0.0"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "cometmind.fullname" . }}-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.serve | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: workspace
              mountPath: /workspace
            {{- if and .Values.settings.create .Values.settings.json }}
            - name: settings
              mountPath: /data/cometline-settings.json
              subPath: cometline-settings.json
            {{- end }}
        {{- if .Values.discord.enabled }}
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/cometmind", "gateway", "run", "--platform", "discord"]
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "cometmind.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.resources.gateway | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: workspace
              mountPath: /workspace
            {{- if and .Values.settings.create .Values.settings.json }}
            - name: settings
              mountPath: /data/cometline-settings.json
              subPath: cometline-settings.json
            {{- end }}
        {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cometmind.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: workspace
          {{- if .Values.workspace.emptyDir }}
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "cometmind.fullname" . }}-workspace
          {{- end }}
        {{- if and .Values.settings.create .Values.settings.json }}
        - name: settings
          configMap:
            name: {{ include "cometmind.fullname" . }}-settings
        {{- end }}
